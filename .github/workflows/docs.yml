name: Build and Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'uniqc/**'
      - 'site/**'
      - 'examples/**'
      - 'example-exec-logs/**'
      - 'scripts/build_docs.py'
      - 'scripts/check_doc_logs.py'
      - 'scripts/check_local_links.py'
      - 'scripts/generate_release_notes.py'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'uniqc/**'
      - 'site/**'
      - 'examples/**'
      - 'example-exec-logs/**'
      - 'scripts/build_docs.py'
      - 'scripts/check_doc_logs.py'
      - 'scripts/check_local_links.py'
      - 'scripts/generate_release_notes.py'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    env:
      DOCS_STABLE_VERSION: ${{ github.ref_type == 'tag' && '1' || '0' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          submodules: true
          fetch-depth: 0  # Need full history for setuptools_scm

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          uv venv
          uv pip install --group docs .

      # The full pre-doc-execution pipeline is run *locally* by maintainers
      # (see CONTRIBUTING.md). CI only re-validates the cached run logs and
      # then runs sphinx without re-executing examples.
      - name: Verify example-exec-logs/
        run: |
          uv run --no-sync python scripts/check_doc_logs.py

      - name: Build docs
        run: |
          cd docs
          uv run --no-sync make html-fast SPHINXOPTS="-W --keep-going"

      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp -r site/* _site/
          cp -r docs/_build/html/* _site/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: _site

  deploy-docs:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
