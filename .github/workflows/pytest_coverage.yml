name: Pytest Coverage

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/pytest_coverage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/pytest_coverage.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      with:
        submodules: 'true'

    - name: Install uv
      uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build
        # Remove system-installed typing_extensions to avoid pip conflict
        sudo apt-get remove -y python3-typing-extensions 2>/dev/null || true

    - name: Install package (with all optional dependencies and C++ extension)
      run: |
        uv pip install --system setuptools setuptools_scm wheel pybind11
        uv pip uninstall unified-quantum --system -y || true
        rm -rf build/ dist/ *.egg-info uniqc.egg-info
        uv pip install --system ".[all]" --no-build-isolation

    - name: Install test dependencies
      run: uv pip install --system pytest pytest-cov httpx

    # NOTE: torchquantum is intentionally NOT installed until after the main
    # qiskit/dill-sensitive suite has finished. Installing torchquantum brings
    # `dill` as a transitive dep, and once `dill` is importable, qiskit's
    # pickle path for `qiskit.circuit.Qubit` fails with
    #   "Tried to instantiate class 'Qubit._from_owned', but it does not exist!
    #    Ensure that it is registered via torch::class_"
    # in test_transpiler_qiskit. Running the qiskit tests first in a
    # dill-free environment side-steps the issue.

    - name: Run non-torchquantum tests (dill-free environment)
      run: |
        pytest uniqc/test/ -v --no-cov -m "not cloud" \
          --ignore=uniqc/test/adapter/test_tq_algorithms.py \
          --ignore=uniqc/test/simulator/test_torchquantum_simulator.py \
          --ignore=uniqc/test/simulator/test_simulator_factory.py

    - name: Run non-torchquantum tests with coverage (dill-free environment)
      run: |
        pytest uniqc/test/ --cov=uniqc --cov-report=term-missing --cov-report=xml \
          -v --no-cov-on-fail -m "not cloud" \
          --ignore=uniqc/test/adapter/test_tq_algorithms.py \
          --ignore=uniqc/test/simulator/test_torchquantum_simulator.py \
          --ignore=uniqc/test/simulator/test_simulator_factory.py \
          || true

    - name: Install torchquantum (fork; not installable from PyPI)
      # See the NOTE above: this install brings `dill`, which is incompatible
      # with the qiskit transpiler tests. We install it *after* the main pytest
      # runs so the dill-sensitive suite stays clean.
      run: |
        uv pip install --system \
          "torchquantum @ git+https://github.com/Agony5757/torchquantum.git@fix/optional-qiskit-deps"

    - name: Run torchquantum-touching tests
      run: |
        pytest \
          uniqc/test/adapter/test_tq_algorithms.py \
          uniqc/test/simulator/test_torchquantum_simulator.py \
          uniqc/test/simulator/test_simulator_factory.py \
          -v --no-cov -m "not cloud"

    - name: Run torchquantum-touching tests with coverage (append)
      run: |
        pytest \
          uniqc/test/adapter/test_tq_algorithms.py \
          uniqc/test/simulator/test_torchquantum_simulator.py \
          uniqc/test/simulator/test_simulator_factory.py \
          --cov=uniqc --cov-append --cov-report=term-missing --cov-report=xml \
          -v --no-cov-on-fail -m "not cloud" \
          || true

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
      with:
        name: coverage-report-py${{ matrix.python-version }}
        path: coverage.xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5.5.4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
