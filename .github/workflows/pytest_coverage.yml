name: Pytest Coverage

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/pytest_coverage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/pytest_coverage.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      with:
        submodules: 'true'

    - name: Install uv
      uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build
        # Remove system-installed typing_extensions to avoid pip conflict
        sudo apt-get remove -y python3-typing-extensions 2>/dev/null || true

    - name: Install package (with all optional dependencies and C++ extension)
      run: |
        uv pip install --system setuptools setuptools_scm wheel pybind11
        uv pip uninstall unified-quantum --system -y || true
        rm -rf build/ dist/ *.egg-info uniqc.egg-info
        uv pip install --system ".[all]" --no-build-isolation

    - name: Install test dependencies
      run: uv pip install --system pytest pytest-cov httpx

    - name: Install torchquantum (fork; not installable from PyPI)
      # The upstream torchquantum on PyPI (0.1.8, 2022) pins qiskit<1.0 and is
      # unusable here. We use a maintained fork with optional qiskit deps.
      # This cannot live in the `[all]` extra because PyPI rejects published
      # distributions whose metadata contains direct URL references.
      run: |
        uv pip install --system \
          "torchquantum @ git+https://github.com/Agony5757/torchquantum.git@fix/optional-qiskit-deps"

    - name: Run tests without coverage first (avoid dill serialization issue with qiskit+torchquantum)
      run: pytest uniqc/test/ -v --no-cov -m "not cloud"

    - name: Run tests with coverage (for coverage report only)
      run: pytest uniqc/test/ --cov=uniqc --cov-report=term-missing --cov-report=xml -v --no-cov-on-fail -m "not cloud" || true

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
      with:
        name: coverage-report-py${{ matrix.python-version }}
        path: coverage.xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5.5.4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
