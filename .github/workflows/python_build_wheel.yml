# .github/workflows/build_wheels.yml

name: Build Python Wheels

# 控制 workflow 何时触发
on:
  push:
    branches: [ "main" ]
    paths:
      - 'pyproject.toml'
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'scripts/stubgen.py'
      - '.github/workflows/python_build_wheel.yml'
  # 允许手动触发
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }} # 根据矩阵指定运行环境
    strategy:
      # 不要因为一个组合失败就取消其他组合
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    # 第一步：检出代码库
    - name: Checkout repository
      uses: actions/checkout@v5 # 使用官方的 checkout action
      with:
        submodules: 'true'
        fetch-depth: 0  # Need full history for setuptools_scm version detection

    # 第二步：设置用于运行 cibuildwheel 的 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v6 # 使用官方的 setup-python action
      with:
        python-version: '3.12'

    # 第三步：用 cibuildwheel 按 pyproject.toml 中的矩阵构建 wheel
    - name: Build wheels
      uses: pypa/cibuildwheel@v3.4.1

    - name: Validate wheel ABI
      run: python scripts/check_wheel_abi.py wheelhouse/*.whl

    # 第五步：上传构建产物 (wheel 文件)
    # 将 wheelhouse/ 目录下的所有 .whl 文件作为 artifact 上传
    - name: Upload wheel artifact
      uses: actions/upload-artifact@v5 # 使用官方的 upload-artifact action
      with:
        # 为 artifact 命名，包含 OS 和 Python 版本信息以便区分
        name: wheel-${{ matrix.os }}
        # 指定要上传的文件路径，通常是 dist 目录下的 wheel 文件
        path: wheelhouse/*.whl
        # 如果构建失败或没有生成文件，上传操作会优雅处理，但你可以设置如果找不到文件则失败
        # if-no-files-found: error # 可选: 'warn' (默认), 'error', 'ignore'
