# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: Build-and-test

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/build_and_test.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/build_and_test.yml'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      with:
        submodules: 'true'

    - name: Install uv
      uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build
        # Remove system-installed typing_extensions to avoid pip conflict
        sudo apt-get remove -y python3-typing-extensions 2>/dev/null || true

    - name: Install build dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        uv pip install --system cmake ninja setuptools setuptools_scm wheel pybind11

    - name: Build (with all optional dependencies)
      run: |
        uv pip install --system setuptools setuptools_scm wheel pybind11
        uv pip uninstall unified-quantum --system -y || true
        uv pip install --system ".[all]" --no-build-isolation

    - name: Install dev dependencies
      run: |
        uv pip install --system pytest pytest-cov ruff httpx

    - name: Install torchquantum (fork; Linux only, not installable from PyPI)
      if: runner.os == 'Linux'
      # The upstream torchquantum on PyPI (0.1.8, 2022) pins qiskit<1.0 and is
      # unusable here. We use a maintained fork with optional qiskit deps.
      # This cannot live in the `[all]` extra because PyPI rejects published
      # distributions whose metadata contains direct URL references.
      run: |
        uv pip install --system \
          "torchquantum @ git+https://github.com/Agony5757/torchquantum.git@fix/optional-qiskit-deps"

    - name: Run tests with deprecation monitoring
      env:
        PYTHONWARNINGS: "default::DeprecationWarning,default::FutureWarning"
      run: |
        pytest uniqc/test/ -v --tb=short -m "not cloud"

    - name: Check for deprecation warnings (fail on error)
      if: runner.os == 'Linux'
      env:
        PYTHONWARNINGS: "error::DeprecationWarning,error::FutureWarning"
      run: |
        python -c "
        import warnings
        warnings.filterwarnings('error')

        # Test each platform import for deprecations
        try:
            import qiskit
            print(f'qiskit version: {qiskit.__version__}')
        except DeprecationWarning as e:
            print(f'Qiskit deprecation detected: {e}')
            raise
        except ImportError:
            print('qiskit not installed - skipping')

        print('Deprecation check passed')
        " || echo "::warning::Deprecation warnings detected in platform libraries"

    - name: Upload coverage report
      if: runner.os == 'Linux' && matrix.c_compiler == 'gcc' && matrix.python-version == '3.11'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: coverage-report
        path: .coverage
        retention-days: 7

