[pytest]
testpaths = uniqc/test
python_files = test_*.py
python_classes = Test* RunTest*
python_functions = test_* run_test_*
addopts = -v
pythonpath = .
filterwarnings =
    ignore:The `StatevectorSimulator` backend will be deprecated.*:PendingDeprecationWarning:qiskit_aer\.backends\.statevector_simulator
    ignore:The `QasmSimulator` backend will be deprecated.*:PendingDeprecationWarning:qiskit_aer\.backends\.qasm_simulator
    ignore:The function expand_operator has been generalized.*:DeprecationWarning:qutip_qip\.operations\.gates
    ignore:The expansion of output gate matrix is no longer included.*:DeprecationWarning:qutip_qip\.operations\.gates

markers =
    cloud: Tests requiring real cloud credentials, network access, or platform API access
    real_cloud_execution: Tests that submit circuits to real cloud backends; skipped unless --real-cloud-test is passed
    requires_cpp: Tests requiring compiled C++ backend
    requires_pytorch: Tests requiring PyTorch
    requires_torchquantum: Tests requiring TorchQuantum
    requires_qiskit: Tests requiring Qiskit
    requires_quafu: Tests requiring Quafu/pyquafu
    requires_pyqpanda3: Tests requiring pyqpanda3
    requires_provider_chip_cache: Tests requiring a provider chip cache populated under ~/.uniqc/backend/chips/
    requires_originq_credentials: Tests requiring an OriginQ API token in uniqc config
    requires_quafu_credentials: Tests requiring a Quafu API token in uniqc config
    requires_quark_credentials: Tests requiring a Quark API token in uniqc config
    requires_ibm_credentials: Tests requiring an IBM Quantum API token in uniqc config
    slow: Tests whose total runtime exceeds ~10 s; informational marker (not auto-skipped).
