[pytest]
testpaths = uniqc/test
python_files = test_*.py
python_classes = Test* RunTest*
python_functions = test_* run_test_*
addopts = -v
pythonpath = .

markers =
    cloud: Tests requiring real cloud credentials (deselected by default in CI)
    requires_cpp: Tests requiring compiled C++ backend
    requires_pytorch: Tests requiring PyTorch
    requires_torchquantum: Tests requiring TorchQuantum
    requires_qiskit: Tests requiring Qiskit
    requires_quafu: Tests requiring Quafu/pyquafu
    requires_pyqpanda3: Tests requiring pyqpanda3
